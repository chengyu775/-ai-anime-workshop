<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta
name=“viewport”
content=“width=device-width, initial-scale=1.0”

<title>AI工作流工坊</title>
<style>
/* =========================
   全局
========================= */
* {
    box-sizing: border-box;
}
html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    background: #f3f3f3;
    color: #222;
}
/* =========================
   顶部工具栏
========================= */
.topbar {
    height: 60px;
    background: white;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    position: relative;
    z-index: 100;
}
.title {
    font-size: 18px;
    font-weight: bold;
}
.top-buttons {
    display: flex;
    gap: 8px;
}
.top-buttons button {
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 14px;
    cursor: pointer;
}
.save-btn {
    background: #222;
    color: white;
}
.run-btn {
    background: #e8e8e8;
    color: #222;
}
/* =========================
   主体
========================= */
.main {
    display: flex;
    width: 100%;
    height:
        calc(100% - 60px);
}
/* =========================
   左侧节点栏
========================= */
.sidebar {
    width: 180px;
    background: white;
    border-right:
        1px solid #ddd;
    padding: 15px;
    z-index: 50;
}
.sidebar h3 {
    margin-top: 0;
    font-size: 16px;
}
.node-button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border:
        1px solid #ddd;
    background: white;
    border-radius: 10px;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
}
.node-button:active {
    transform:
        scale(0.97);
}
/* =========================
   画布区域
========================= */
.canvas-wrapper {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #f7f7f7;
}
/* =========================
   工作流画布
========================= */
.canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 3000px;
    height: 2000px;
    transform-origin:
        0 0;
    background-color:
        #f7f7f7;
    background-image:
        linear-gradient(
            #e5e5e5 1px,
            transparent 1px
        ),
        linear-gradient(
            90deg,
            #e5e5e5 1px,
            transparent 1px
        );
    background-size:
        25px 25px;
}
/* =========================
   节点
========================= */
.node {
    position: absolute;
    width: 190px;
    background: white;
    border:
        1px solid #ccc;
    border-radius: 14px;
    box-shadow:
        0 5px 15px
        rgba(0,0,0,0.1);
    user-select: none;
    will-change:
        transform;
}
.node-header {
    padding: 12px;
    border-bottom:
        1px solid #eee;
    font-weight: bold;
    cursor: grab;
    touch-action: none;
}
.node-header:active {
    cursor: grabbing;
}
.node-content {
    padding: 12px;
    font-size: 13px;
    color: #666;
}
.delete-node {
    float: right;
    border: none;
    background: none;
    color: #999;
    cursor: pointer;
    font-size: 18px;
}
/* =========================
   节点连接点
========================= */
.connection {
    width: 14px;
    height: 14px;
    background: #555;
    border-radius: 50%;
    position: absolute;
    right: -7px;
    top: 50%;
    transform:
        translateY(-50%);
}
.input-connection {
    width: 14px;
    height: 14px;
    background: #555;
    border-radius: 50%;
    position: absolute;
    left: -7px;
    top: 50%;
    transform:
        translateY(-50%);
}
/* =========================
   画布控制器
========================= */
.canvas-controls {
    position: absolute;
    right: 15px;
    bottom: 15px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 5px;
    background: white;
    padding: 6px;
    border-radius: 12px;
    box-shadow:
        0 4px 15px
        rgba(0,0,0,0.12);
}
.canvas-controls button {
    width: 38px;
    height: 38px;
    border: none;
    background: white;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
}
.canvas-controls button:active {
    background: #eee;
}
.zoom-value {
    min-width: 55px;
    text-align: center;
    font-size: 13px;
}
/* =========================
   空状态
========================= */
.empty-message {
    position: absolute;
    top: 500px;
    left: 1000px;
    text-align: center;
    color: #999;
    pointer-events: none;
    width: 250px;
}
/* =========================
   手机 / iPad
========================= */
@media
(max-width: 600px) {
    .sidebar {
        width: 130px;
        padding: 10px;
    }
    .node-button {
        font-size: 12px;
        padding: 10px;
    }
    .node {
        width: 165px;
    }
}
</style>
</head>
<body>
<!-- =========================
     顶部
========================= -->
<div class="topbar">
<div class="title">
    🧠 AI工作流工坊
</div>
<div class="top-buttons">
    <button
        class="save-btn"
        onclick="saveWorkflow()"
    >
        💾 保存
    </button>
    <button
        class="run-btn"
        onclick="runWorkflow()"
    >
        ▶️ 运行
    </button>
</div>
</div>
<!-- =========================
     主体
========================= -->
<div class="main">
<!-- 节点栏 -->
<div class="sidebar">
    <h3>
        节点
    </h3>
    <button
        class="node-button"
        onclick="addNode('input')"
    >
        📝 输入
    </button>
    <button
        class="node-button"
        onclick="addNode('ai')"
    >
        🤖 AI
    </button>
    <button
        class="node-button"
        onclick="addNode('image')"
    >
        🎨 AI生图
    </button>
    <button
        class="node-button"
        onclick="addNode('output')"
    >
        💾 输出
    </button>
</div>
<!-- 画布 -->
<div
    id="canvasWrapper"
    class="canvas-wrapper"
>
    <div
        id="canvas"
        class="canvas"
    >
        <div
            id="emptyMessage"
            class="empty-message"
        >
            点击左侧节点
            <br>
            创建你的第一个工作流
        </div>
    </div>
    <!-- 画布控制 -->
    <div class="canvas-controls">
        <button
            onclick="zoomOut()"
        >
            −
        </button>
        <div
            id="zoomValue"
            class="zoom-value"
        >
            100%
        </div>
        <button
            onclick="zoomIn()"
        >
            ＋
        </button>
        <button
            onclick="resetCanvas()"
        >
            ⊙
        </button>
    </div>
</div>
</div>
<script>
/* =========================
   数据
========================= */
let nodes = [];
let nodeCounter = 0;
let scale = 1;
let offsetX = 0;
let offsetY = 0;
/* =========================
   节点类型
========================= */
const nodeTypes = {
    input: {
        title:
            "📝 输入节点",
        content:
            "输入角色或任务信息"
    },
    ai: {
        title:
            "🤖 AI节点",
        content:
            "调用AI模型处理内容"
    },
    image: {
        title:
            "🎨 AI生图节点",
        content:
            "根据提示词生成图片"
    },
    output: {
        title:
            "💾 输出节点",
        content:
            "保存最终结果"
    }
};
/* =========================
   更新画布
========================= */
function updateCanvas() {
    const canvas =
        document.getElementById(
            "canvas"
        );
    canvas.style.transform =
        `translate3d(
            ${offsetX}px,
            ${offsetY}px,
            0
        )
        scale(${scale})`;
    document.getElementById(
        "zoomValue"
    ).innerText =
        Math.round(
            scale * 100
        ) + "%";
}
/* =========================
   添加节点
========================= */
function addNode(type) {
    const canvas =
        document.getElementById(
            "canvas"
        );
    document.getElementById(
        "emptyMessage"
    ).style.display =
        "none";
    const node =
        document.createElement(
            "div"
        );
    node.className =
        "node";
    const id =
        "node-" +
        nodeCounter++;
    node.dataset.id =
        id;
    const x =
        200 +
        nodes.length * 40;
    const y =
        200 +
        nodes.length * 40;
    node.style.left =
        x + "px";
    node.style.top =
        y + "px";
    node.innerHTML = `
        <div
            class="node-header"
        >
            ${nodeTypes[type].title}
            <button
                class="delete-node"
                onclick="deleteNode(this)"
            >
                ×
            </button>
        </div>
        <div
            class="node-content"
        >
            ${nodeTypes[type].content}
        </div>
        <div
            class="input-connection"
        >
        </div>
        <div
            class="connection"
        >
        </div>
    `;
    canvas.appendChild(
        node
    );
    nodes.push({
        id: id,
        type: type,
        x: x,
        y: y
    });
    makeDraggable(
        node
    );
}
/* =========================
   删除节点
========================= */
function deleteNode(
    button
) {
    const node =
        button.closest(
            ".node"
        );
    const id =
        node.dataset.id;
    node.remove();
    nodes =
        nodes.filter(
            item =>
                item.id !== id
        );
}
/* =========================
   节点拖动
========================= */
function makeDraggable(
    node
) {
    const header =
        node.querySelector(
            ".node-header"
        );
    let dragging =
        false;
    let startX =
        0;
    let startY =
        0;
    let startLeft =
        0;
    let startTop =
        0;
    header.addEventListener(
        "pointerdown",
        function(event) {
            dragging =
                true;
            header.setPointerCapture(
                event.pointerId
            );
            startX =
                event.clientX;
            startY =
                event.clientY;
            startLeft =
                parseFloat(
                    node.style.left
                );
            startTop =
                parseFloat(
                    node.style.top
                );
        }
    );
    header.addEventListener(
        "pointermove",
        function(event) {
            if (!dragging)
                return;
            const dx =
                (
                    event.clientX -
                    startX
                ) / scale;
            const dy =
                (
                    event.clientY -
                    startY
                ) / scale;
            const newX =
                startLeft +
                dx;
            const newY =
                startTop +
                dy;
            node.style.left =
                newX + "px";
            node.style.top =
                newY + "px";
            const item =
                nodes.find(
                    n =>
                        n.id ===
                        node.dataset.id
                );
            if (item) {
                item.x =
                    newX;
                item.y =
                    newY;
            }
        }
    );
    header.addEventListener(
        "pointerup",
        function() {
            dragging =
                false;
        }
    );
}
/* =========================
   放大
========================= */
function zoomIn() {
    scale +=
        0.1;
    if (
        scale > 2
    ) {
        scale = 2;
    }
    updateCanvas();
}
/* =========================
   缩小
========================= */
function zoomOut() {
    scale -=
        0.1;
    if (
        scale < 0.3
    ) {
        scale = 0.3;
    }
    updateCanvas();
}
/* =========================
   重置画布
========================= */
function resetCanvas() {
    scale =
        1;
    offsetX =
        0;
    offsetY =
        0;
    updateCanvas();
}
/* =========================
   保存
========================= */
function saveWorkflow() {
    localStorage.setItem(
        "aiWorkflowNodes",
        JSON.stringify(
            nodes
        )
    );
    alert(
        "工作流已保存！"
    );
}
/* =========================
   运行
========================= */
function runWorkflow() {
    if (
        nodes.length === 0
    ) {
        alert(
            "请先添加节点。"
        );
        return;
    }
    alert(
        "工作流开始运行！\n\n" +
        "当前节点数量：" +
        nodes.length +
        "\n\n" +
        "下一步我们将加入节点连线系统。"
    );
}
/* =========================
   加载保存的数据
========================= */
function loadWorkflow() {
    const saved =
        localStorage.getItem(
            "aiWorkflowNodes"
        );
    if (!saved)
        return;
    try {
        const savedNodes =
            JSON.parse(
                saved
            );
        savedNodes.forEach(
            item => {
                const canvas =
                    document.getElementById(
                        "canvas"
                    );
                document.getElementById(
                    "emptyMessage"
                ).style.display =
                    "none";
                const node =
                    document.createElement(
                        "div"
                    );
                node.className =
                    "node";
                node.dataset.id =
                    item.id;
                node.style.left =
                    item.x + "px";
                node.style.top =
                    item.y + "px";
                node.innerHTML = `
                    <div
                        class="node-header"
                    >
                        ${
                            nodeTypes[
                                item.type
                            ].title
                        }
                        <button
                            class="delete-node"
                            onclick="deleteNode(this)"
                        >
                            ×
                        </button>
                    </div>
                    <div
                        class="node-content"
                    >
                        ${
                            nodeTypes[
                                item.type
                            ].content
                        }
                    </div>
                    <div
                        class="input-connection"
                    >
                    </div>
                    <div
                        class="connection"
                    >
                    </div>
                `;
                canvas.appendChild(
                    node
                );
                makeDraggable(
                    node
                );
                nodes.push(
                    item
                );
                nodeCounter++;
            }
        );
    }
    catch (
        error
    ) {
        console.log(
            "加载失败",
            error
        );
    }
}
/* =========================
   启动
========================= */
updateCanvas();
loadWorkflow();
</script>
</body>
</html>
