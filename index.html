<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI动漫工坊</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
        }

        h1 {
            font-size: 32px;
        }

        textarea {
            width: 90%;
            height: 150px;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            font-size: 16px;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎨 AI动漫工坊</h1>

    <p>创造属于你的AI动漫角色</p>

    <textarea id="description"
        placeholder="请输入你的角色描述，例如：20岁的农村青年陈默，性格内向，不爱说话……">
    </textarea>

    <br>

    <button onclick="createCharacter()">
        ✨ 创建角色
    </button>

    <div id="result">
        等待创建你的AI角色……
    </div>

</div>

<script>

function createCharacter() {

    let description =
        document.getElementById("description").value;

    if (description.trim() === "") {

        alert("请先输入角色描述");

        return;
    }

    document.getElementById("result").innerHTML =
        "🎭 你的角色设定：<br><br>" +
        description;

}

</script>

</body>
</html>
