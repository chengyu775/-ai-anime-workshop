<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工作流工坊</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f7;
            color: #222;
        }

        .header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .create-button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #222;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .create-button:active {
            transform: scale(0.98);
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .workflow-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .workflow-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .workflow-card h3 {
            margin: 0 0 8px 0;
        }

        .workflow-card p {
            margin: 0 0 15px 0;
            color: #777;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
        }

        .open-button,
        .delete-button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .open-button {
            background: #222;
            color: white;
            border: none;
        }

        .delete-button {
            background: white;
            color: #d00;
            border: 1px solid #ddd;
        }

        .empty {
            text-align: center;
            padding: 50px 20px;
            color: #888;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            padding: 25px;
        }

        .modal-content h2 {
            margin-top: 0;
        }

        .input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .cancel-button {
            background: white;
            border: 1px solid #ddd;
        }

        .confirm-button {
            background: #222;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🧠 AI工作流工坊</h1>
    </div>

    <div class="container">

        <button class="create-button" onclick="openCreateModal()">
            ＋ 创建工作流
        </button>

        <h2 class="section-title">我的工作流</h2>

        <div id="workflowList" class="workflow-list">
        </div>

    </div>


    <!-- 创建工作流弹窗 -->

    <div id="createModal" class="modal">

        <div class="modal-content">

            <h2>创建工作流</h2>

            <input
                id="workflowName"
                class="input"
                type="text"
                placeholder="请输入工作流名称"
            >

            <input
                id="workflowDescription"
                class="input"
                type="text"
                placeholder="请输入工作流描述"
            >

            <div class="modal-buttons">

                <button
                    class="cancel-button"
                    onclick="closeCreateModal()"
                >
                    取消
                </button>

                <button
                    class="confirm-button"
                    onclick="createWorkflow()"
                >
                    创建
                </button>

            </div>

        </div>

    </div>


    <script>

        // 获取已经保存的工作流
        let workflows = JSON.parse(
            localStorage.getItem("workflows")
        ) || [];


        // 显示工作流
        function renderWorkflows() {

            const list = document.getElementById("workflowList");

            list.innerHTML = "";

            if (workflows.length === 0) {

                list.innerHTML = `
                    <div class="empty">
                        <p>暂无工作流</p>
                        <p>点击上方按钮创建你的第一个工作流</p>
                    </div>
                `;

                return;
            }


            workflows.forEach(function(workflow, index) {

                const card = document.createElement("div");

                card.className = "workflow-card";

                card.innerHTML = `

                    <h3>${workflow.name}</h3>

                    <p>${workflow.description}</p>

                    <div class="card-buttons">

                        <button
                            class="open-button"
                            onclick="openWorkflow(${index})"
                        >
                            打开
                        </button>

                        <button
                            class="delete-button"
                            onclick="deleteWorkflow(${index})"
                        >
                            删除
                        </button>

                    </div>

                `;

                list.appendChild(card);

            });

        }


        // 打开创建窗口
        function openCreateModal() {

            document.getElementById("createModal").style.display = "flex";

        }


        // 关闭创建窗口
        function closeCreateModal() {

            document.getElementById("createModal").style.display = "none";

        }


        // 创建工作流
        function createWorkflow() {

            const name =
                document.getElementById("workflowName").value.trim();

            const description =
                document.getElementById("workflowDescription").value.trim();


            if (name === "") {

                alert("请输入工作流名称");

                return;

            }


            const newWorkflow = {

                name: name,

                description:
                    description || "暂无描述",

                nodes: []

            };


            workflows.push(newWorkflow);


            // 保存到浏览器
            localStorage.setItem(
                "workflows",
                JSON.stringify(workflows)
            );


            // 清空输入框
            document.getElementById("workflowName").value = "";

            document.getElementById("workflowDescription").value = "";


            closeCreateModal();


            renderWorkflows();

        }


        // 删除工作流
        function deleteWorkflow(index) {

            const confirmDelete =
                confirm("确定要删除这个工作流吗？");


            if (!confirmDelete) {

                return;

            }


            workflows.splice(index, 1);


            localStorage.setItem(
                "workflows",
                JSON.stringify(workflows)
            );


            renderWorkflows();

        }


        // 打开工作流
        function openWorkflow(index) {

            const workflow = workflows[index];

            alert(
                "你打开了工作流：\n\n" +
                workflow.name +
                "\n\n下一步我们会制作工作流编辑器。"
            );

        }


        // 页面加载时显示工作流
        renderWorkflows();

    </script>

</body>
</html>
